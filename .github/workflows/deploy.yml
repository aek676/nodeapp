# This is a basic workflow to help you get started with Actions

name: Deploy

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches: [main]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  deploy:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: 'just-a-placeholder-so-we-dont-get-errors'

      - name: Adding Known Hosts
        run: ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh azureuser@${{ secrets.SSH_HOST }} "if [ ! -d 'nodeapp' ]; then \
              git clone https://github.com/aek676/nodeapp.git; \
            else \
              cd nodeapp && git stash && git fetch --all && git reset --hard origin/main && git pull origin main; \
            fi"  
          ssh azureuser@${{ secrets.SSH_HOST }} "if pgrep node; then forever stopall; fi" 
          ssh azureuser@${{ secrets.SSH_HOST }} "source /home/azureuser/.nvm/nvm.sh && cd nodeapp && npm install"
          ssh azureuser@${{ secrets.SSH_HOST }} "source /home/azureuser/.nvm/nvm.sh && cd nodeapp && PORT=8080 forever start src/main.js"
